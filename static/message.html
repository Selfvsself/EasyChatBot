<!DOCTYPE html>
<html lang="en" class="sl-theme-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/dark.css" />
    <script type="module"
            src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>

    <style>
        body {
            margin: 0;
            font-family: var(--sl-font-sans);
            background-color: var(--sl-color-neutral-0);
            display: flex;
            overflow: hidden;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            height: calc(var(--vh, 1vh) * 100);
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .header {
            padding: 12px;
            border-bottom: 1px solid var(--sl-color-neutral-200);
            font-weight: 600;
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 8px;

            padding: 10px 12px;
            border-bottom: 1px solid var(--sl-color-neutral-200);

            font-size: var(--sl-font-size-medium);
            font-weight: var(--sl-font-weight-semibold);
        }
        #profile-btn {
            max-width: 160px; /* можно 120–180 подобрать */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-text {
            display: inline-block;
            max-width: 140px;

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-title-wrapper {
            flex: 1;
            text-align: center;
            overflow: hidden;
            margin-left: var(--sl-spacing-small);
        }

        #chat-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== ЧАТ ===== */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            overflow-y: auto;
            flex-direction: column;
            gap: 10px;
        }

        /* ===== СООБЩЕНИЕ ===== */
        .message {
            max-width: 75%;
            padding: 10px 12px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--sl-color-primary-600);
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--sl-color-neutral-200);
        }

        /* ===== INPUT ===== */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            border-top: 1px solid var(--sl-color-neutral-200);
            padding-bottom: env(safe-area-inset-bottom);
        }

        sl-input {
            flex: 1;
        }

        sl-textarea#input::part(textarea) {
            max-height: 120px;
            overflow-y: auto;
        }

        .input-area {
            align-items: flex-end;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="app-header">
        <sl-icon name="arrow-left" id="back-btn" style="cursor: pointer;"></sl-icon>

        <div class="chat-title-wrapper">
            <div id="chat-title"></div>
        </div>

        <sl-dropdown placement="bottom-end">
            <sl-button slot="trigger" variant="text" circle>
                <sl-icon name="person-circle"></sl-icon>
            </sl-button>

            <sl-menu>
            <sl-menu-item id="profile-btn">
                <sl-icon name="person" slot="prefix"></sl-icon>
                <span class="profile-text"></span>
            </sl-menu-item>

            <sl-divider></sl-divider>
                <sl-menu-item id="logout-btn" variant="danger">
                    <sl-icon name="box-arrow-right" slot="prefix"></sl-icon>
                    Выйти
                </sl-menu-item>
            </sl-menu>
        </sl-dropdown>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <sl-textarea
            id="input"
            placeholder="Напишите сообщение..."
            rows="1"
            resize="auto"
            style="--size: 0; flex: 1;"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
        ></sl-textarea>
        <sl-button variant="primary" id="send-btn">Отправить</sl-button>
    </div>
</div>

<script>
    const LOGIN_URL = "/web/login";
    const CHATS_URL = "/web/apps";
    const API_APPS = "/api/apps";
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = LOGIN_URL;
    }

    const CURRENT_CHAT_ID = "{{ chat_id }}";
    const CURRENT_APP_ID = "{{ app_id }}";
    const CURRENT_APP_MODE = "{{ app_chat_mode }}";
    const rawName = "{{ chat_name }}";

    const CURRENT_CHAT_NAME =
        rawName && rawName !== "null" && rawName !== "undefined"
            ? rawName
            : "Чат";

    const chatTitle = document.getElementById("chat-title");
    chatTitle.innerText = CURRENT_CHAT_NAME;
    const rawUserName = localStorage.getItem("username");

    function truncate(text, maxLength = 20) {
        if (!text) return "Профиль";
        return text.length > maxLength
            ? text.slice(0, maxLength) + "..."
            : text;
    }

    const CURRENT_USER_NAME =
        rawUserName && rawUserName !== "null" && rawUserName !== "undefined"
            ? rawUserName
            : "Профиль";

    const profileText = document.querySelector(".profile-text");

    profileText.textContent = truncate(CURRENT_USER_NAME);
    const chat = document.getElementById("chat");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");

    const ws = new WebSocket(`ws://${location.host}${API_APPS}/${CURRENT_APP_ID}/chat/${CURRENT_CHAT_ID}/ws?token=${token}`);

    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        addMessage(msg.role, msg.text);
    };

    loadHistory();

    async function loadHistory() {
        try {
            const res = await fetch(API_APPS + `/${CURRENT_APP_ID}/chat/${CURRENT_CHAT_ID}/history`, {
                headers: {
                    "Authorization": `Bearer ${token}`
                }
            });

            if (!res.ok) throw new Error('Ошибка загрузки истории');

            const data = await res.json();
            chat.innerHTML = '';

            data.messages.forEach(msg => {
                addMessage(msg.role, msg.text);
            });

        } catch (err) {
            console.error(err);
        }
    }

    function send() {
        const text = input.value.trim();
        if (!text) return;

        fetch(API_APPS + `/${CURRENT_APP_ID}/chat/${CURRENT_CHAT_ID}/send`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ text })
        });

        input.value = "";
    }

    function addMessage(role, text) {
        const div = document.createElement("div");
        div.className = `message ${role}`;
        div.innerText = text;

        chat.appendChild(div);

        // автоскролл вниз
        chat.scrollTop = chat.scrollHeight;
    }

    function setViewportHeight() {
        let vh = window.innerHeight * 0.01;
        document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    setViewportHeight();
    window.addEventListener('resize', setViewportHeight);

    sendBtn.addEventListener("click", send);

    input.addEventListener("sl-keydown", (event) => {
        if (event.key === "Enter") send();
    });
    document.getElementById("back-btn").onclick = () => {
    if (typeof CURRENT_APP_MODE !== 'undefined' && (CURRENT_APP_MODE === 'STATELESS') || (CURRENT_APP_MODE === 'SINGLE_CHAT')) {
        window.location.href = CHATS_URL;
    } else {
        window.location.href = CHATS_URL + `/${CURRENT_APP_ID}/chat`;
    }
    };
    async function handleLogout() {
    try {
        const res = await fetch("/api/auth/logout", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${token}`
            }
        });

        if (res.ok) {
            localStorage.removeItem("token");
            localStorage.removeItem("username");

            window.location.href = LOGIN_URL;
        }
    } catch (error) {
        console.error("Ошибка при выходе:", error);
        localStorage.clear();
        window.location.href = LOGIN_URL;
    }
    }

    document.getElementById("logout-btn").addEventListener('click', handleLogout);
</script>
</body>
</html>
